[build]
  publish = "."
  command = "cd admin && npm install && npm run build"

[functions]
  directory = "functions"

# admin アセットはそのまま配信（リダイレクトより先にファイルが存在すれば配信される）
[[redirects]]
  from = "/admin"
  to = "/admin/dist/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/admin/"
  to = "/admin/dist/index.html"
  status = 200
  force = true
